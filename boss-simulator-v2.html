/* ============ AUDIO ============ */
var audioCtx=null;
function initAudio(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}}
function playTone(freq,dur,type){
  if(!soundEnabled||!audioCtx)return;
  try{
    var osc=audioCtx.createOscillator();
    var gain=audioCtx.createGain();
    osc.type=type||'sine';
    osc.frequency.value=freq;
    gain.gain.setValueAtTime(0.15,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+dur);
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.start();osc.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function playClick(){playTone(800,0.08,'sine');}
function playExtreme(){playTone(200,0.3,'sawtooth');playTone(150,0.2,'square');}
function playNormal(){playTone(600,0.15,'sine');playTone(800,0.15,'sine');}
function playWin(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){playTone(f,0.2,'sine');},i*100);});}
function playLose(){[400,350,300,200].forEach(function(f,i){setTimeout(function(){playTone(f,0.3,'sawtooth');},i*120);});}
function playAchievement(){[880,1100,1320].forEach(function(f,i){setTimeout(function(){playTone(f,0.15,'sine');},i*80);});}

function toggleSound(){
  soundEnabled=!soundEnabled;
  initAudio();
  document.getElementById('sound-toggle').textContent=soundEnabled?'🔊':'🔇';
}

/* ============ HELPERS ============ */
function t(key){var v=S[key];return v?((typeof v==='string')?v:v[lang]):key;}
function tev(key,e){var v=e[key];return v?((typeof v==='string')?v:v[lang]):'';}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}

/* ============ STAFF SYSTEM ============ */
function initStaff(){
  state.staff=STAFF_TEMPLATE.map(function(s){
    return{
      id:s.id,emoji:s.emoji,name:tev('name',s),role:tev('role',s),
      mood:50,resignThreshold:s.resignThreshold,rebelThreshold:s.rebelThreshold,
      quit:false,rebel:false
    };
  });
}

function updateStaffMood(delta){
  state.staff.forEach(function(s){
    if(s.quit)return;
    s.mood=clamp(s.mood+delta,0,100);
    if(s.mood<=10&&!s.quit){s.quit=true;s.rebel=false;state.staffQuit++;checkAchievement('staff_quit');}
    else if(s.mood<=20&&!s.rebel&&!s.quit){s.rebel=true;state.staffRebel++;checkAchievement('staff_rebel');}
  });
  renderStaff();
}

function renderStaff(){
  var grid=document.getElementById('staff-grid');
  if(!grid)return;
  grid.innerHTML='';
  var active=0;
  state.staff.forEach(function(s){
    if(!s.quit)active++;
    var card=document.createElement('div');
    card.className='staff-card'+(s.quit?' quit':'')+(s.rebel?' rebel':'');
    var moodClass=s.mood>60?'mood-happy':s.mood>30?'mood-normal':'mood-angry';
    var moodText=s.mood>60?(lang==='cn'?'开心':'Happy'):s.mood>30?(lang==='cn'?'一般':'OK'):(lang==='cn'?'愤怒':'Angry');
    card.innerHTML='<div class="staff-emoji">'+s.emoji+'</div><div class="staff-name">'+s.name+'</div><div class="staff-role">'+s.role+'</div><div class="staff-mood '+moodClass+'">'+moodText+'</div>';
    grid.appendChild(card);
  });
  var countEl=document.getElementById('staff-count');
  if(countEl)countEl.textContent=active+'/'+state.staff.length;
}

/* ============ ACHIEVEMENT SYSTEM ============ */
function checkAchievement(id){
  if(state.achievements.indexOf(id)!==-1)return false;
  state.achievements.push(id);
  playAchievement();
  updateAchCount();
  if(state.achievements.length>=25)checkAchievement('all_achievements');
  return true;
}

function checkAchievements(){
  if(state.madness>=50)checkAchievement('madness_50');
  if(state.anger>=50)checkAchievement('anger_50');
  if(state.funds<=0)checkAchievement('funds_0');
  if(state.allExtremeCount>=5)checkAchievement('all_extreme');
  if(state.allNormalCount>=5)checkAchievement('all_normal');
  if(state.extremeChain>=3)checkAchievement('chain_3');
  if(state.extremeChain>=5)checkAchievement('chain_5');
  if(state.round>=15)checkAchievement('survivor');
  if(state.round>=25)checkAchievement('marathon');
  if(state.funds>=150)checkAchievement('rich');
  if(state.madness>=80&&!state.gameOver)checkAchievement('cult');
  if(state.maxAnger<30&&state.round>5)checkAchievement('diplomat');
  if(state.staffQuit>=3)checkAchievement('tyrant');
  if(state.round<=10&&state.gameOver&&state._lastReason==='victory')checkAchievement('speedrun');
  var activeStaff=state.staff.filter(function(s){return!s.quit;}).length;
  if(activeStaff===0&&state.staff.length>0)checkAchievement('chaos');
}

function updateAchCount(){
  var el=document.getElementById('ach-count');
  if(el)el.textContent=state.achievements.length+'/'+ACHIEVEMENTS.length;
}

function renderAchievements(){
  var grid=document.getElementById('ach-grid');
  if(!grid)return;
  grid.innerHTML='';
  ACHIEVEMENTS.forEach(function(a){
    var unlocked=state.achievements.indexOf(a.id)!==-1;
    var cell=document.createElement('div');
    cell.className='ach-cell'+(unlocked?' unlocked':'');
    cell.innerHTML='<div class="ach-cell-icon">'+(unlocked?a.icon:'❓')+'</div><div class="ach-cell-name">'+tev('name',a)+'</div>';
    grid.appendChild(cell);
  });
  var list=document.getElementById('ach-list');
  if(list){
    list.innerHTML='';
    ACHIEVEMENTS.forEach(function(a){
      var unlocked=state.achievements.indexOf(a.id)!==-1;
      var span=document.createElement('span');
      span.className='ach-item'+(unlocked?' unlocked':'');
      span.textContent=unlocked?a.icon:'❓';
      span.title=tev('name',a);
      list.appendChild(span);
    });
  }
}

function showAchievements(){
  renderAchievements();
  document.getElementById('ach-modal').classList.add('show');
}
function hideAchievements(){
  document.getElementById('ach-modal').classList.remove('show');
}

/* ============ CHAIN EVENTS ============ */
function checkChainEvent(){
  if(!state.ngPlus)return null;
  if(state.extremeChain>=3&&Math.random()<0.3){
    return EVENTS_NG[Math.floor(Math.random()*EVENTS_NG.length)];
  }
  return null;
}

function showChainBanner(text){
  var banner=document.getElementById('chain-banner');
  if(!banner)return;
  banner.textContent=text;
  banner.classList.add('show');
  setTimeout(function(){banner.classList.remove('show');},3000);
}

/* ============ UI UPDATES ============ */
function updateStats(){
  document.getElementById('funds-bar').style.width=state.funds+'%';
  document.getElementById('anger-bar').style.width=state.anger+'%';
  document.getElementById('madness-bar').style.width=state.madness+'%';
  document.getElementById('funds-val').textContent=state.funds;
  document.getElementById('anger-val').textContent=state.anger;
  document.getElementById('madness-val').textContent=state.madness;
}

function showToast(changes){
  var old=document.querySelector('.toast');
  if(old)old.remove();
  var toast=document.createElement('div');
  toast.className='toast';
  [{val:changes.funds,emoji:'💰'},{val:changes.anger,emoji:'😡'},{val:changes.madness,emoji:'🤪'}].forEach(function(c){
    if(c.val===0)return;
    var span=document.createElement('span');
    span.className='toast-item '+(c.val>0?'negative':'positive');
    span.textContent=c.emoji+(c.val>0?'+':'')+c.val;
    toast.appendChild(span);
  });
  document.getElementById('app').appendChild(toast);
  setTimeout(function(){toast.remove();},1200);
}

/* ============ LANGUAGE SWITCH ============ */
function switchLang(l){
  lang=l;
  document.getElementById('lang-en').className=l==='en'?'active':'';
  document.getElementById('lang-cn').className=l==='cn'?'active':'';
  document.getElementById('start-title').textContent=t('startTitle');
  document.getElementById('start-sub').textContent=t('startSub');
  document.getElementById('start-btn').textContent=t('startBtn');
  document.getElementById('start-desc').innerHTML=t('startDesc');
  document.getElementById('lbl-funds').textContent=t('lblFunds');
  document.getElementById('lbl-anger').textContent=t('lblAnger');
  document.getElementById('lbl-madness').textContent=t('lblMadness');
  document.getElementById('restart-btn').textContent=t('restartBtn');
  document.getElementById('staff-title-text').textContent=t('staffTitle');
  if(document.getElementById('game-screen').classList.contains('active')&&!state.gameOver){
    renderCurrentEvent();
  }
  if(document.getElementById('end-screen').classList.contains('active')){
    renderEndScreen(state._lastReason);
  }
  renderStaff();
}

/* ============ GAME LOGIC ============ */
function getAvailableEvents(){
  var pool=EVENTS.slice();
  if(state.ngPlus)pool=pool.concat(EVENTS_NG);
  return pool.filter(function(e){return state.usedEvents.indexOf(e.id)===-1;});
}

function getNextEvent(){
  var chainEvent=checkChainEvent();
  if(chainEvent)return chainEvent;
  var available=getAvailableEvents().filter(function(e){
    if(e.id===50)return state.round>=15;
    return true;
  });
  if(available.length===0)return null;
  return available[Math.floor(Math.random()*available.length)];
}

function checkGameOver(){
  if(state.funds<=0){endGame('bankrupt');return true;}
  if(state.anger>=100){endGame('revolt');return true;}
  if(state.madness>=100){endGame('insane');return true;}
  var activeStaff=state.staff.filter(function(s){return!s.quit&&!s.rebel;}).length;
  if(activeStaff===0&&state.staff.length>0){endGame('revolt');return true;}
  if(state.round>=20&&state.usedEvents.length>=20){endGame('victory');return true;}
  return false;
}

function renderCurrentEvent(){
  if(!_currentEvent)return;
  var e=_currentEvent;
  var roundStr=t('roundInfo').replace('{round}',state.round).replace('{done}',state.usedEvents.length);
  document.getElementById('round-info').innerHTML=roundStr;
  var card=document.getElementById('event-card');
  card.style.animation='none';card.offsetHeight;card.style.animation='slideUp .4s ease-out';
  document.getElementById('event-tag').textContent=tev('tag',e);
  document.getElementById('event-title').textContent=tev('title',e);
  document.getElementById('event-bg').textContent=tev('bg',e);
  var optsArea=document.getElementById('options-area');
  optsArea.innerHTML='';
  var clsMap=['opt-a','opt-b','opt-c'];
  e.opts.forEach(function(opt,i){
    var btn=document.createElement('button');
    btn.className='option-btn '+clsMap[i];
    btn.innerHTML='<span class="opt-letter">'+opt.letter+'</span><div><div>'+tev('text',opt)+'</div><div class="effect-hint">'+opt.hint+'</div></div>';
    btn.onclick=function(){
      if(state.gameOver)return;
      playClick();
      var allBtns=document.querySelectorAll('.option-btn');
      for(var k=0;k<allBtns.length;k++)allBtns[k].classList.add('disabled');
      state.funds=clamp(state.funds+opt.funds,0,150);
      state.anger=clamp(state.anger+opt.anger,0,100);
      state.madness=clamp(state.madness+opt.madness,0,100);
      state.maxFunds=Math.max(state.maxFunds,state.funds);
      state.maxAnger=Math.max(state.maxAnger,state.anger);
      state.maxMadness=Math.max(state.maxMadness,state.madness);
      if(opt.extreme){
        state.extremeChain++;
        state.normalChain=0;
        state.allExtremeCount++;
        playExtreme();
        updateStaffMood(-15);
      }else{
        state.normalChain++;
        state.extremeChain=0;
        state.allNormalCount++;
        playNormal();
        updateStaffMood(+5);
      }
      updateStats();
      showToast({funds:opt.funds,anger:opt.anger,madness:opt.madness});
      if(opt.anger>=25||opt.madness>=20){
        document.getElementById('app').classList.add('shake');
        setTimeout(function(){document.getElementById('app').classList.remove('shake');},500);
      }
      checkAchievements();
      setTimeout(function(){
        if(!checkGameOver()){
          renderEvent();
        }
      },800+Math.random()*400);
    };
    optsArea.appendChild(btn);
  });
}

function renderEvent(){
  if(checkGameOver())return;
  var e=getNextEvent();
  if(!e){endGame('victory');return;}
  _currentEvent=e;
  state.usedEvents.push(e.id);
  state.round++;
  state.totalRounds++;
  if(state.extremeChain>=3){
    showChainBanner(lang==='cn'?'⚡ 极端连锁 x'+state.extremeChain+'！员工们开始害怕了...':'⚡ Extreme Chain x'+state.extremeChain+'! Staff are getting scared...');
  }
  renderCurrentEvent();
}

/* ============ SCREEN TRANSITIONS ============ */
function showScreen(id){
  ['start-screen','game-screen','end-screen'].forEach(function(s){
    document.getElementById(s).classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

/* ============ END GAME ============ */
function renderEndScreen(reason){
  state._lastReason=reason;
  var ending=S[reason];
  document.getElementById('end-emoji').textContent=ending.emoji;
  document.getElementById('end-title').textContent=tev('title',ending);
  document.getElementById('end-title').style.color=reason==='victory'?'#ffd700':'#ff6b35';
  document.getElementById('end-desc').innerHTML=tev('desc',ending);
  document.getElementById('end-funds').textContent=state.funds;
  document.getElementById('end-anger').textContent=state.anger;
  document.getElementById('end-madness').textContent=state.madness;
  document.getElementById('end-fl').textContent=t('endFl');
  document.getElementById('end-al').textContent=t('endAl');
  document.getElementById('end-ml').textContent=t('endMl');
  renderAchievements();
}

function endGame(reason){
  state.gameOver=true;
  checkAchievements();
  if(reason==='victory'){
    playWin();
    if(!state.unlockedNG){
      state.unlockedNG=true;
      checkAchievement('ng_plus');
    }
    if(state.allNormalCount>=state.round&&state.allExtremeCount===0)checkAchievement('pacifist');
  }else{
    playLose();
  }
  showScreen('end-screen');
  renderEndScreen(reason);
}

/* ============ START / RESTART ============ */
function startGame(){
  var wasNG=state.ngPlus;
  var savedCoins=state.coins||0;
  var savedWatch=state.watchCount||0;
  state={
    funds:wasNG?120:100,anger:0,madness:0,round:0,
    usedEvents:[],gameOver:false,
    staff:[],extremeChain:0,normalChain:0,
    achievements:state.achievements||[],ngPlus:wasNG,unlockedNG:state.unlockedNG||false,
    allExtremeCount:0,allNormalCount:0,
    maxFunds:wasNG?120:100,maxAnger:0,maxMadness:0,
    staffQuit:0,staffRebel:0,totalRounds:state.totalRounds||0,
    coins:savedCoins,watchCount:savedWatch,adEnabled:state.adEnabled!==false
  };
  initStaff();
  _currentEvent=null;
  updateStats();
  updateAchCount();
  renderStaff();
  showScreen('game-screen');
  renderEvent();
}

function restartGame(){
  state.ngPlus=false;
  showScreen('start-screen');
  var ngEl=document.getElementById('new-game-plus');
  if(state.unlockedNG){
    ngEl.classList.add('show');
    ngEl.innerHTML=(lang==='cn'?'🌟 新游戏+ 已解锁！':'🌟 New Game+ Unlocked!')+'<br><small>'+(lang==='cn'?'初始资金+20，解锁隐藏事件':'Start with +20 funds, unlock hidden events')+'</small><br><button onclick="startNGPlus()" style="margin-top:8px;padding:8px 16px;background:rgba(255,215,0,.3);border:1px solid #ffd700;border-radius:8px;color:#ffd700;cursor:pointer;">'+(lang==='cn'?'开始二周目':'Start New Game+')+'</button>';
  }
}

function startNGPlus(){
  state.ngPlus=true;
  startGame();
}

/* ============ SHARE ============ */
function shareResult(){
  var text=lang==='cn'
    ?'我在《社畜重生：老板模拟器》中'+state.round+'轮后'+S[state._lastReason].emoji+'！资金'+state.funds+' 愤怒'+state.anger+' 疯狂'+state.madness+'。解锁了'+state.achievements.length+'个成就！你能超越我吗？'
    :'I played Corporate Overlord Simulator and '+state._lastReason+' after '+state.round+' rounds! Funds:'+state.funds+' Anger:'+state.anger+' Madness:'+state.madness+'. Unlocked '+state.achievements.length+' achievements! Can you beat me?';
  if(navigator.share){
    navigator.share({title:lang==='cn'?'社畜重生：老板模拟器':'Corporate Overlord Simulator',text:text});
  }else{
    var ta=document.createElement('textarea');
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert(lang==='cn'?'成绩已复制到剪贴板！':'Score copied to clipboard!');
  }
}

/* ============ AD SYSTEM ============ */
function showAd(type, callback){
  if(!state.adEnabled){
    if(callback)callback();
    return;
  }
  var adOverlay=document.createElement('div');
  adOverlay.id='ad-overlay';
  adOverlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;';
  
  var adContent=document.createElement('div');
  adContent.style.cssText='background:#1a1a2e;border-radius:16px;padding:24px;max-width:320px;width:100%;text-align:center;border:1px solid rgba(255,255,255,.1);';
  
  var title=type==='revive'?t('adReviveTitle'):type==='double'?t('adDoubleTitle'):t('adRewardTitle');
  var desc=type==='revive'?t('adReviveDesc'):type==='double'?t('adDoubleDesc'):t('adRewardDesc');
  
  adContent.innerHTML='<div style="font-size:48px;margin-bottom:12px;">📺</div><div style="font-size:18px;font-weight:700;margin-bottom:8px;color:#fff;">'+title+'</div><div style="font-size:13px;color:#888;margin-bottom:20px;line-height:1.5;">'+desc+'</div>';
  
  var watchBtn=document.createElement('button');
  watchBtn.textContent=t('watchAd');
  watchBtn.style.cssText='width:100%;padding:14px;background:linear-gradient(135deg,#e94560,#ff6b35);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;';
  watchBtn.onclick=function(){
    state.watchCount++;
    state.coins+=5;
    saveGame();
    document.body.removeChild(adOverlay);
    if(callback)callback(true);
  };
  
  var skipBtn=document.createElement('button');
  skipBtn.textContent=t('skipAd');
  skipBtn.style.cssText='width:100%;padding:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#888;font-size:14px;cursor:pointer;';
  skipBtn.onclick=function(){
    document.body.removeChild(adOverlay);
    if(callback)callback(false);
  };
  
  adContent.appendChild(watchBtn);
  adContent.appendChild(skipBtn);
  adOverlay.appendChild(adContent);
  document.body.appendChild(adOverlay);
}

function showShop(){
  var shopOverlay=document.createElement('div');
  shopOverlay.id='shop-overlay';
  shopOverlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;';
  
  var shopContent=document.createElement('div');
  shopContent.style.cssText='background:#1a1a2e;border-radius:16px;padding:24px;max-width:340px;width:100%;text-align:center;border:1px solid rgba(255,255,255,.1);max-height:80vh;overflow-y:auto;';
  
  shopContent.innerHTML='<div style="font-size:32px;margin-bottom:8px;">🏪</div><div style="font-size:20px;font-weight:700;margin-bottom:4px;color:#fff;">'+t('shopTitle')+'</div><div style="font-size:13px;color:#888;margin-bottom:16px;">'+t('coins')+': <span style="color:#ffd700;font-weight:700;">'+(state.coins||0)+'</span> 💰</div>';
  
  var items=[
    {id:'remove_ads',icon:'🚫',name:t('itemRemoveAds'),desc:t('descRemoveAds'),price:50},
    {id:'funds_pack',icon:'💵',name:t('itemFunds'),desc:t('descFunds'),price:10},
    {id:'hint_pack',icon:'💡',name:t('itemHint'),desc:t('descHint'),price:5},
    {id:'theme_dark',icon:'🌙',name:t('itemTheme'),desc:t('descTheme'),price:20}
  ];
  
  items.forEach(function(item){
    var itemDiv=document.createElement('div');
    itemDiv.style.cssText='background:rgba(255,255,255,.03);border-radius:12px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:12px;text-align:left;';
    itemDiv.innerHTML='<div style="font-size:28px;">'+item.icon+'</div><div style="flex:1;"><div style="font-size:14px;font-weight:600;color:#fff;">'+item.name+'</div><div style="font-size:12px;color:#888;margin-top:2px;">'+item.desc+'</div></div><div style="text-align:right;"><div style="font-size:16px;font-weight:700;color:#ffd700;">'+item.price+'💰</div></div>';
    
    var buyBtn=document.createElement('button');
    buyBtn.textContent=(state.coins||0)>=item.price?t('buy'):t('notEnough');
    buyBtn.style.cssText='padding:6px 14px;background:'+((state.coins||0)>=item.price?'linear-gradient(135deg,#27ae60,#2ecc71)':'#555')+';border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;margin-top:6px;width:100%;';
    buyBtn.disabled=(state.coins||0)<item.price;
    buyBtn.onclick=function(){
      if((state.coins||0)>=item.price){
        state.coins-=item.price;
        if(item.id==='remove_ads'){
          state.adEnabled=false;
          alert(t('adsRemoved'));
        }else if(item.id==='funds_pack'){
          state.funds=Math.min(state.funds+30,150);
          updateStats();
          alert(t('fundsAdded'));
        }else if(item.id==='hint_pack'){
          alert(t('hintUnlocked'));
        }else if(item.id==='theme_dark'){
          alert(t('themeUnlocked'));
        }
        saveGame();
        document.body.removeChild(shopOverlay);
        showShop();
      }
    };
    
    itemDiv.appendChild(buyBtn);
    shopContent.appendChild(itemDiv);
  });
  
  var closeBtn=document.createElement('button');
  closeBtn.textContent=t('close');
  closeBtn.style.cssText='width:100%;padding:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#888;font-size:14px;cursor:pointer;margin-top:10px;';
  closeBtn.onclick=function(){
    document.body.removeChild(shopOverlay);
  };
  shopContent.appendChild(closeBtn);
  shopOverlay.appendChild(shopContent);
  document.body.appendChild(shopOverlay);
}

function saveGame(){
  try{
    localStorage.setItem('boss_sim_save',JSON.stringify({
      achievements:state.achievements,
      unlockedNG:state.unlockedNG,
      coins:state.coins,
      watchCount:state.watchCount,
      adEnabled:state.adEnabled,
      totalRounds:state.totalRounds
    }));
  }catch(e){}
}

function loadGame(){
  try{
    var saved=JSON.parse(localStorage.getItem('boss_sim_save')||'{}');
    if(saved.achievements)state.achievements=saved.achievements;
    if(saved.unlockedNG)state.unlockedNG=saved.unlockedNG;
    if(saved.coins)state.coins=saved.coins;
    if(saved.watchCount)state.watchCount=saved.watchCount;
    if(saved.adEnabled!==undefined)state.adEnabled=saved.adEnabled;
    if(saved.totalRounds)state.totalRounds=saved.totalRounds;
  }catch(e){}
}

/* ============ INIT ============ */
loadGame();
updateStats();
updateAchCount();
switchLang('cn');
</script>
